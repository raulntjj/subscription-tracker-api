name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.2"

jobs:
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_sqlite, mbstring, bcmath, gd, zip, intl, sockets
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock', 'composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Run Pint (dry-run)
        run: ./vendor/bin/pint --test

  tests:
    name: "Tests (${{ matrix.module }})"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        module: [Subscription, User]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_sqlite, mbstring, bcmath, gd, zip, intl, sockets
          tools: composer:v2
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock', 'composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.ci .env
          php artisan key:generate

      - name: Create storage structure
        run: |
          mkdir -p storage/app/private storage/app/public
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/testing storage/framework/views
          mkdir -p storage/logs/workers
          chmod -R 775 storage bootstrap/cache

      - name: Run module tests — ${{ matrix.module }}
        run: php artisan module:test ${{ matrix.module }}

  coverage:
    name: "Coverage Report"
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_sqlite, mbstring, bcmath, gd, zip, intl, sockets
          tools: composer:v2
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock', 'composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.ci .env
          php artisan key:generate

      - name: Create storage structure
        run: |
          mkdir -p storage/app/private storage/app/public
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/testing storage/framework/views
          mkdir -p storage/logs/workers
          chmod -R 775 storage bootstrap/cache

      - name: Run full test suite with coverage
        run: |
          ./vendor/bin/phpunit \
            --testsuite "Modules Unit" \
            --coverage-text \
            --coverage-clover=coverage.xml \
            --colors=always

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage.xml
          retention-days: 7