[PHP]
; Configurações PHP para produção

; Erros (desabilitado em produção)
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /var/www/html/storage/logs/php-error.log

; Limites
memory_limit = 512M
max_execution_time = 60
max_input_time = 60
upload_max_filesize = 50M
post_max_size = 50M

; Timezone
date.timezone = America/Sao_Paulo

; OPcache (habilitado e otimizado para produção)
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1

; Session
session.save_handler = redis
session.save_path = "tcp://redis-sessions:6379"

; Realpath cache (otimizado para produção)
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Security
expose_php = Off
